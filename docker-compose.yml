services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: cdc_demo
      DB_USER: user
      DB_PASSWORD: password
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cdc_demo
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d cdc_demo" ]
      interval: 5s
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
